<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>திட்டம் மே 2026 - வினாடி வினா</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;700;800&family=Hind+Madurai:wght@400;500;600&display=swap');

  :root {
    --primary: #1a237e;
    --accent: #f57f17;
    --success: #2e7d32;
    --danger: #c62828;
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #666;
    --border: #e0e0e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hind Madurai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #1565c0 100%);
    color: white;
    padding: 20px 16px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-family: 'Hind Madurai', sans-serif;
  }
  .header h1 {
    font-family: 'Baloo Thambi 2', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 14px;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 12px;
    opacity: 0.9;
  }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-icon { font-size: 14px; }

  /* PROGRESS */
  .progress-wrap {
    background: white;
    padding: 12px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .progress-bar {
    height: 6px;
    background: #e8eaf6;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a237e, #1565c0);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* MAIN */
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* QUESTION CARD */
  .q-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    display: none;
    animation: slideIn 0.3s ease;
  }
  .q-card.active { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .q-number {
    background: var(--primary);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Hind Madurai', sans-serif;
  }
  .q-topic {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    background: #fff8e1;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .q-text {
    font-family: 'Baloo Thambi 2', sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: #f8f9fe;
    border: 2px solid #e8eaf6;
    border-radius: 12px;
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Hind Madurai', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn:hover:not(:disabled) {
    background: #e8eaf6;
    border-color: var(--primary);
    transform: translateX(3px);
  }
  .option-label {
    min-width: 26px;
    height: 26px;
    background: #e8eaf6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
    font-family: 'Hind Madurai', sans-serif;
  }
  .option-btn.correct {
    background: #e8f5e9;
    border-color: var(--success);
    color: var(--success);
  }
  .option-btn.correct .option-label {
    background: var(--success);
    color: white;
  }
  .option-btn.wrong {
    background: #ffebee;
    border-color: var(--danger);
    color: var(--danger);
  }
  .option-btn.wrong .option-label {
    background: var(--danger);
    color: white;
  }
  .option-btn:disabled { cursor: default; transform: none; }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin-top: 14px;
    background: #e3f2fd;
    border-left: 4px solid #1565c0;
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #1a237e;
    font-weight: 500;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* NEXT BUTTON */
  .next-area { margin-top: 16px; display: none; }
  .next-area.show { display: block; }
  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a237e, #1565c0);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Baloo Thambi 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,35,126,0.3); }
  .next-btn:active { transform: translateY(0); }

  /* RESULT SCREEN */
  #result-screen {
    display: none;
    text-align: center;
    padding: 20px 0;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .result-icon { font-size: 60px; margin-bottom: 12px; }
  .result-title {
    font-family: 'Baloo Thambi 2', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 48px;
    font-weight: 800;
    font-family: 'Baloo Thambi 2', sans-serif;
    color: var(--accent);
    line-height: 1;
    margin: 10px 0;
  }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .rs-item {
    background: #f5f5f0;
    border-radius: 12px;
    padding: 12px 8px;
  }
  .rs-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'Baloo Thambi 2', sans-serif;
  }
  .rs-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .rs-correct .rs-num { color: var(--success); }
  .rs-wrong .rs-num { color: var(--danger); }
  .rs-pct .rs-num { color: var(--primary); }

  .restart-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f57f17, #ff8f00);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Baloo Thambi 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,127,23,0.3); }

  .topic-tag {
    display: inline-block;
    background: #e8eaf6;
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    margin: 3px;
  }

  .performance-msg {
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    border-radius: 12px;
    padding: 14px;
    margin-top: 14px;
    font-size: 13px;
    color: #2e7d32;
    font-weight: 600;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">திட்டம் மே 2026</div>
  <h1>திட்டம் மாத இதழ் வினாடி வினா</h1>

let current = 0;
let score = 0;
let answered = false;

function init() {
  renderQuestion(current);
  updateProgress();
}

function renderQuestion(idx) {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  const q = questions[idx];

  const card = document.createElement('div');
  card.className = 'q-card active';
  card.id = 'q-card';

  const labels = ['அ', 'ஆ', 'இ', 'ஈ'];

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-number">கேள்வி ${idx + 1}</span>
      <span class="q-topic">${q.topic}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="options">
      ${q.opts.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">
          <span class="option-label">${labels[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="explanation">💡 <strong>விளக்கம்:</strong> ${q.exp}</div>
    <div class="next-area" id="next-area">
      <button class="next-btn" onclick="nextQuestion()">
        ${idx === questions.length - 1 ? '📊 முடிவைப் பார்' : 'அடுத்த கேள்வி →'}
      </button>
    </div>
  `;

  area.appendChild(card);
  answered = false;
}

function selectAnswer(selected) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll('.option-btn');

  buttons.forEach(btn => btn.disabled = true);

  if (selected === q.ans) {
    buttons[selected].classList.add('correct');
    score++;
  } else {
    buttons[selected].classList.add('wrong');
    buttons[q.ans].classList.add('correct');
  }

  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-area').classList.add('show');
  document.getElementById('score-text').textContent = `மதிப்பெண்: ${score}`;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
    return;
  }
  renderQuestion(current);
  updateProgress();
}

function updateProgress() {
  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `கேள்வி ${current + 1} / ${questions.length}`;
}

function showResult() {
  document.getElementById('quiz-area').innerHTML = '';
  document.querySelector('.progress-wrap').style.display = 'none';

  const pct = Math.round((score / questions.length) * 100);
  let icon, msg, msgText;

  if (pct >= 80) {
    icon = '🏆'; msg = 'மிகச் சிறந்தது!';
    msgText = 'நீங்கள் திட்டம் மே 2026 இதழை நன்கு படித்துள்ளீர்கள். TNPSC தேர்வில் வெற்றி நிச்சயம்!';
  } else if (pct >= 60) {
    icon = '⭐'; msg = 'நல்ல முயற்சி!';
    msgText = 'நல்ல அடித்தளம் உள்ளது. மீண்டும் ஒருமுறை படித்தால் மேலும் மேம்படுவீர்கள்.';
  } else if (pct >= 40) {
    icon = '📚'; msg = 'தொடர்ந்து படியுங்கள்!';
    msgText = 'திட்டம் இதழை மீண்டும் கவனமாகப் படியுங்கள். சரியான விளக்கங்களை கவனிக்கவும்.';
  } else {
    icon = '💪'; msg = 'மீண்டும் முயற்சி செய்யுங்கள்!';
    msgText = 'திட்டம் இதழை முழுமையாகப் படியுங்கள். ஒவ்வொரு கட்டுரையும் முக்கியமானது.';
  }

  const wrong = questions.length - score;

  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('result-screen').innerHTML = `
    <div class="result-card">
      <div class="result-icon">${icon}</div>
      <div class="result-title">${msg}</div>
      <div class="result-score">${score}/${questions.length}</div>
      <div class="result-sub">திட்டம் மே 2026 வினாடி வினா முடிந்தது</div>
      <div class="result-stats">
        <div class="rs-item rs-correct">
          <div class="rs-num">${score}</div>
          <div class="rs-label">✅ சரியானவை</div>
        </div>
        <div class="rs-item rs-wrong">
          <div class="rs-num">${wrong}</div>
          <div class="rs-label">❌ தவறானவை</div>
        </div>
        <div class="rs-item rs-pct">
          <div class="rs-num">${pct}%</div>
          <div class="rs-label">🎯 மதிப்பெண்</div>
        </div>
      </div>
      <div class="performance-msg">${msgText}</div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 மீண்டும் விளையாடு</button>
  `;
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('result-screen').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'block';
  document.getElementById('score-text').textContent = 'மதிப்பெண்: 0';
  init();
}

init();
</script>
</body>
</html>
